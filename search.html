<!DOCTYPE html><html lang="en-us"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chris K. N.</title><meta name="description" content="I write in different languages and about very different topics. I also help small-business owners with communication and marketing."><link rel="stylesheet" href="https://christian.nordtomme.com/assets/css/main.css"></head><body class="site-container"><header class="site-header"><div class="site-header__inner"><div class="site-header__brand"><a href="https://christian.nordtomme.com/" class="site-header__title">Chris K. N. </a><span class="site-header__tagline"></span></div><div class="site-header__right"><nav class="site-header__nav"><a href="https://christian.nordtomme.com/tags/norwegian/" target="_self">På Norsk</a> <a href="https://christian.nordtomme.com/tags/english/" target="_self">In English</a> <span class="site-header__nav-sep" aria-hidden="true">|</span> <a href="https://christian.nordtomme.com/tags/" target="_self">Tags</a></nav><a href="https://christian.nordtomme.com/search.html" class="site-header__search" aria-label="Search"><svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a></div></div></header><main class="site-main"><div class="search-page"><header class="post-list__header"><h1 class="post-list__title">Search the site</h1><form action="https://christian.nordtomme.com/search.html" method="get" class="search-page__form" style="margin-top: 2rem; position: relative;"><input type="search" name="q" placeholder="Type here..." class="search-page__input" style="width: 100%; border: 1px solid var(--color-border); border-radius: 4px; padding: 1rem 1.5rem; font-size: 1.1rem; background: var(--color-bg-alt); color: var(--color-text); outline: none;" required> <button type="submit" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: var(--color-text-muted);"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button></form></header><div class="post-list" id="publii-search-results"><div style="text-align: center; padding: 4rem 0; color: var(--color-text-muted);" id="search-status"><p>Enter a search term above to find posts.</p></div></div><script>document.addEventListener("DOMContentLoaded", function () {
                    const urlParams = new URLSearchParams(window.location.search);
                    const query = urlParams.get('q');

                    if (query) {
                        const searchInput = document.querySelector('.search-page__input');
                        const resultsContainer = document.getElementById('publii-search-results');
                        const statusDiv = document.getElementById('search-status');

                        if (searchInput) {
                            searchInput.value = query;
                        }

                        if (statusDiv) {
                            statusDiv.innerHTML = '<p>Searching...</p>';
                        }

                        let feedUrl = 'https://christian.nordtomme.com/feed.json';
                        if (window.location.protocol === 'file:') {
                            // When viewing locally via filesystem preview in Publii
                            let path = window.location.pathname;
                            // Usually preview files are in some output dir, try to go to the root of that output dir
                            let segments = path.split('/');
                            let previewIndex = segments.indexOf('preview');
                            if (previewIndex !== -1) {
                                feedUrl = segments.slice(0, previewIndex + 1).join('/') + '/feed.json';
                            } else {
                                feedUrl = '../feed.json'; // fallback generic relative
                            }
                        }

                        fetch(feedUrl)
                            .then(response => {
                                if (!response.ok) {
                                    throw new Error('feed.json could not be loaded. Please ensure JSON Feed is enabled in the site settings.');
                                }
                                return response.json();
                            })
                            .then(data => {
                                const items = data.items || [];
                                const lowerQuery = query.toLowerCase();

                                const filtered = items.filter(item => {
                                    const title = (item.title || "").toLowerCase();
                                    const summary = (item.summary || "").toLowerCase();
                                    const content = (item.content_html || "").toLowerCase();
                                    return title.includes(lowerQuery) || summary.includes(lowerQuery) || content.includes(lowerQuery);
                                });

                                if (filtered.length === 0) {
                                    resultsContainer.innerHTML = '<div style="text-align: center; padding: 4rem 0; color: var(--color-text-muted);"><p>No results found for "<strong>' + query + '</strong>".</p></div>';
                                    return;
                                }

                                let html = '';
                                filtered.forEach(item => {
                                    let excerptOutput = '';
                                    if (item.summary) {
                                        excerptOutput = '<div class="post-card__excerpt post-card__excerpt--auto">' + item.summary + '</div>';
                                    }

                                    html += '<article class="post-card">' +
                                        '<div class="post-card__body">' +
                                        '<h2 class="post-card__title">' +
                                        '<a href="' + item.url + '">' + item.title + '</a>' +
                                        '</h2>' +
                                        excerptOutput +
                                        '<a href="' + item.url + '" style="display: inline-block; margin-top: 0.5rem; font-size: 0.85rem; font-weight: 500;">Read post &rarr;</a>' +
                                        '</div>' +
                                        '</article>';
                                });

                                resultsContainer.innerHTML = html;
                            })
                            .catch(error => {
                                console.error('Search error:', error);
                                resultsContainer.innerHTML = '<div style="text-align: center; padding: 4rem 0; color: var(--color-text-muted);"><p>Search is currently unavailable. (' + error.message + ')</p></div>';
                            });
                    }
                });</script></div></main><footer class="site-footer"><div class="site-footer__inner"><div class="site-footer__top"><div class="site-footer__signup-col"><h2 class="site-footer__heading">Stay Curious</h2><p class="site-footer__desc"></p><div class="site-footer__form"></div></div><div class="site-footer__nav-cols"><div class="site-footer__nav-col"><h5 class="site-footer__nav-heading">Discover</h5><ul class="site-footer__nav-list"><li><a href="https://skriftlig.no" target="_blank">Skriftlig.no</a></li><li><a href="https://chriskn.no" target="_blank">Chris K. N. Consulting</a></li><li><a href="https://medium.com/@nordtomme" target="_blank">Medium (main)</a></li><li><a href="https://medium.com/@chriskn" target="_blank">Medium (marketing)</a></li><li><a href="https://nordtomme.substack.com" target="_blank">Substack</a></li><li><a href="https://www.linkedin.com/in/cknordtomme" target="_blank">LinkedIn</a></li></ul></div><div class="site-footer__nav-col"><h5 class="site-footer__nav-heading">Connect</h5><ul class="site-footer__nav-list"><li><a href="https://ordvekten.no" target="_self">Ordvekten</a></li></ul></div></div></div><div class="site-footer__bottom"><p class="site-footer__copy">&copy;<script>document.write(new Date().getFullYear());</script>Chris K. N.. All rights reserved.</p></div></div></footer></body></html>
